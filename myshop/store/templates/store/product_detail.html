<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }}</title>
</head>
<body>

<h1>{{ product.name }}</h1>

{% if product.photo %}
    <img src="{{ product.photo.url }}" width="300">
{% endif %}

<p><strong>Описание:</strong></p>
<p>{{ product.description }}</p>

<p>
    <strong>Цена:</strong>
    {{ product.price }} руб.
</p>

<p>
    <strong>На складе:</strong>
    {{ product.stock_quantity }}
</p>

<p>
    <strong>Производитель:</strong>
    {{ product.manufacturer }}
</p>

<a href="{% url 'catalog' %}">
    Назад в каталог
</a>

{% if user.is_authenticated %}
    |
    <a href="{% url 'add_to_cart' product.id %}">
        Добавить в корзину
    </a>
{% endif %}

</body>
</html>
