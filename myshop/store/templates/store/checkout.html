<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Оформление заказа</title>
</head>
<body>

<h1>Оформление заказа</h1>

<form method="post">
    {% csrf_token %}

    <p>
        Адрес доставки:
    </p>

    <input
        type="text"
        name="address"
        required
    >

    <br><br>

    <button type="submit">
        Подтвердить заказ
    </button>

</form>

</body>
</html>
