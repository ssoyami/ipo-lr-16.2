<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Регистрация | Мир Масок</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;

    background:linear-gradient(
        135deg,
        #ff9ecf,
        #ffb7d5,
        #ffd6e7
    );

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
}

.container{
    width:100%;
    max-width:500px;

    background:white;

    border-radius:30px;

    padding:40px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#ff2d75;

    margin-bottom:10px;

    font-size:42px;
}

.subtitle{
    text-align:center;
    color:#666;

    margin-bottom:35px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;

    font-weight:600;
    color:#444;
}

input{
    width:100%;
    padding:14px;

    border:2px solid #ffd0e0;
    border-radius:15px;

    font-size:16px;

    outline:none;
}

input:focus{
    border-color:#ff2d75;
}

.btn{
    width:100%;

    border:none;
    cursor:pointer;

    background:#ff2d75;
    color:white;

    padding:15px;

    border-radius:50px;

    font-size:18px;
    font-weight:600;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);

    box-shadow:
    0 8px 20px rgba(255,45,117,.4);
}

.login-link{
    text-align:center;
    margin-top:25px;
}

.login-link a{
    color:#ff2d75;
    text-decoration:none;
    font-weight:600;
}

.login-link a:hover{
    text-decoration:underline;
}

.errorlist{
    list-style:none;
    color:red;
    margin-top:5px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

    <h1>🎭 Регистрация</h1>

    <p class="subtitle">
        Создайте аккаунт в магазине «Мир Масок»
    </p>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">
            <label>Имя пользователя</label>
            {{ form.username }}
        </div>

        <div class="form-group">
            <label>Пароль</label>
            {{ form.password1 }}
        </div>

        <div class="form-group">
            <label>Повторите пароль</label>
            {{ form.password2 }}
        </div>

        <button type="submit" class="btn">
            🎉 Зарегистрироваться
        </button>

    </form>

    <div class="login-link">
        Уже есть аккаунт?
        <a href="{% url 'login' %}">
            Войти
        </a>
    </div>

</div>

</body>
</html>
